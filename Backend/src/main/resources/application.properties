spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/workflow_commerce?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:yash@421}
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update

# App Properties
workflow.app.jwtSecret=${JWT_SECRET:SecretKeyToGenJWTsForMoreSecurityInProductionEnvironmentExampleOnly}
workflow.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
workflow.app.allowedOrigins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:50213,http://127.0.0.1:5173}

# ============== PRODUCTION FEATURES ==============

# Actuator - Health Checks & Metrics
management.endpoints.web.exposure.include=health,info,metrics,caches,env
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.info.env.enabled=true

# Application Info (shown at /actuator/info)
info.app.name=FlowForge
info.app.description=Enterprise Workflow Orchestration Engine
info.app.version=2.0.0
info.app.encoding=UTF-8
info.java.version=${java.version}

# Connection Pool (HikariCP) - Production Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging Configuration
logging.level.com.example.workflowcommerce=INFO
logging.level.org.springframework.cache=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

# JPA/Hibernate Production Settings
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server Settings
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
