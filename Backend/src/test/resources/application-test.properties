# Test Configuration - H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT Configuration for tests
workflow.app.jwtSecret=TestSecretKeyForJWTValidationDuringTestingOnly12345
workflow.app.jwtExpirationMs=86400000
workflow.app.allowedOrigins=http://localhost:5173

# Disable caching for tests
spring.cache.type=none

# Logging
logging.level.org.springframework=WARN
logging.level.com.example.workflowcommerce=DEBUG
